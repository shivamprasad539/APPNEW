<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>song</title>
</head>
 <style>
    .music-banner
    {
        height: 90px;
        width: 1100px;
    }
    .music-image
    {
        height: 530px;
        width: 1120px;
    }
       .music-logo
        {
            position: absolute;
            margin-left: 20px;
            top: 10px;
            left: 5px;
            height: 80px;
            width: 90px;
        }
        .slider-box{
            position: relative;
            width: 1120px;
            margin:auto;
        }

.radio-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}
    </style>
<body onload="a()" bgcolor="white">
   
     <Center>
    <img src="/images/music-banner.jpg" class="music-banner" alt="banner">
    
    </Center>
    <img src="/images/music-logo.png" class="music-logo" alt="logo">
     <hr>
     <div class="slider-box">
    
    <img src="/images/music-image.avif" id="slider" class="music-image">

    <div class="radio-btn">
        <input type="radio" name="r" onclick="change(0)" checked>
        <input type="radio" name="r" onclick="change(1)">
        <input type="radio" name="r" onclick="change(2)">
        <input type="radio" name="r" onclick="change(3)">
        <input type="radio" name="r" onclick="change(4)">
    </div>

</div>

     <script>
var img = ["/images/music-image.avif",
               "/images/music-img1.jpg",
               "/images/music-img2.jpg",
               "/images/music-img3.jpg",
               "/images/music-img4.jpg"]; 

var i = 0;
                                               
function a()
{
document.getElementById("slider").src = img[i];
document.getElementsByName("r")[i].checked=true;
i++;
if(i>=img.length){
    i=0;
}
} 
function change(index) {
    i = index;
    document.getElementById("slider").src = img[i];
}
setInterval(a,2000) //call fun 'a' after every 1000ms
</script>

</body>
</html>
