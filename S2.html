<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>song</title>
</head>
 <style>
    .music-banner
    {
        height: 90px;
        width: 1100px;
    }
    .music-image
    {
        height: 530px;
        width: 1120px;
    }
       .music-logo
        {
            position: absolute;
            margin-left: 20px;
            top: 10px;
            left: 5px;
            height: 80px;
            width: 90px;
        }
    </style>
<body onload="a()" bgcolor="white">
   
     <Center>
    <img src="/images/music-banner.jpg" class="music-banner" alt="banner">
    
    </Center>
    <img src="/images/music-logo.png" class="music-logo" alt="logo">
     <hr>
     <script>
var img = ["/images/music-image.avif",
               "/images/music-img1.jpg",
               "/images/music-img2.jpg",
               "/images/music-img3.jpg",
               "/images/music-img4.jpg"]; 

var i = 0;
                                               
function a()
{
document.getElementById("slider").src = img[i];
i++;
if(i>=img.length){
    i=0;
}
} 
setInterval(a,2000) //call fun 'a' after every 1000ms
</script>
<img src="/images/music-image.avif" id="slider" class="music-image" alt="image">

</body>
</html>
